<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Ifan Adnan">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ifan Adnan">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ifan Adnan</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #D4AF37;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #D4AF37;
      margin-top: 20px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>
  <script>
    // Force HTML renderer for maximum in-app browser compatibility
    window.flutterConfiguration = {
      renderer: "html"
    };

    // Don't hide loading too early - wait for Flutter to actually render
    var flutterReady = false;

    // This will be called by Flutter when it's ready
    window.addEventListener('flutter-first-frame', function() {
      flutterReady = true;
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.display = 'none';
      }
    });

    // Fallback: hide loading after 10 seconds if Flutter still hasn't loaded
    setTimeout(function() {
      if (!flutterReady) {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.innerHTML = '<div style="color: #D4AF37; text-align: center; padding: 20px;">' +
            '<p style="font-size: 18px; margin-bottom: 10px;">Unable to load app</p>' +
            '<p style="font-size: 14px; color: #999;">Please try:</p>' +
            '<p style="font-size: 14px;">1. Opening in your default browser</p>' +
            '<p style="font-size: 14px;">2. Refreshing the page</p>' +
            '<p style="font-size: 14px;">3. Checking your internet connection</p>' +
            '<button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #D4AF37; border: none; border-radius: 5px; color: #000; font-size: 16px; cursor: pointer;">Reload</button>' +
            '</div>';
        }
        console.error('Flutter failed to initialize within 10 seconds');
      }
    }, 10000);

    // Error handling
    window.addEventListener('error', function(e) {
      console.error('Flutter loading error:', e);
      var loading = document.getElementById('loading');
      if (loading && !flutterReady) {
        loading.innerHTML = '<div style="color: #D4AF37; text-align: center; padding: 20px;">' +
          '<p style="font-size: 18px;">Loading error occurred</p>' +
          '<button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #D4AF37; border: none; border-radius: 5px; color: #000; font-size: 16px; cursor: pointer;">Reload</button>' +
          '</div>';
      }
    }, true);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
